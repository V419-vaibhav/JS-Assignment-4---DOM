<!DOCTYPE html>
<html>
<head>
<title>JS DOM Assignment - Dynamic CSS</title>

<style>
body{
    font-family: Arial;
}

#text{
    font-size: 30px;
    margin-bottom: 20px;
}
</style>

</head>

<body>

<h2 id="text">This is some example text</h2>

<input type="color" id="colorPicker">
<button onclick="changeColor()">Change Colour</button>

<br><br>

<input type="range" id="sizeSlider" min="10" max="100" value="30" oninput="changeSize()">

<br><br>

<button onclick="italicText()">Italics</button>
<button onclick="underlineText()">Underline</button>
<button onclick="boldText()">Bold</button>

<br><br>

<select id="fontFamily" onchange="changeFont()">
<option value="serif">Serif</option>
<option value="sans-serif">Sans-serif</option>
<option value="monospace">Monospace</option>
<option value="cursive">Cursive</option>
</select>

<br><br>

<button onclick="getCSS()">Get CSS</button>

<p id="cssOutput"></p>

<script>

let text = document.getElementById("text");

function changeColor(){
    let color = document.getElementById("colorPicker").value;
    text.style.color = color;
}

function changeSize(){
    let size = document.getElementById("sizeSlider").value;
    text.style.fontSize = size + "px";
}

function italicText(){
    text.style.fontStyle = "italic";
}

function underlineText(){
    text.style.textDecoration = "underline";
}

function boldText(){
    text.style.fontWeight = "bold";
}

function changeFont(){
    let font = document.getElementById("fontFamily").value;
    text.style.fontFamily = font;
}

function getCSS(){
    let css = `
color: ${text.style.color};
font-size: ${text.style.fontSize};
font-style: ${text.style.fontStyle};
text-decoration: ${text.style.textDecoration};
font-weight: ${text.style.fontWeight};
font-family: ${text.style.fontFamily};
`;

document.getElementById("cssOutput").innerText = css;
}

</script>

</body>
</html>
